version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: fitpeak-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: fitpeak
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fitpeak-backend
    restart: unless-stopped
    environment:
      MONGODB_URL: mongodb://mongodb:27017
      DATABASE_NAME: fitpeak
      SECRET_KEY: ${SECRET_KEY:-change-this-to-a-secure-random-string-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fitpeak-frontend
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo_data:
